<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>English Version</title>
  <style>
    body{margin:0;padding:0;background:#eef4fa;font-family:Arial,Helvetica,sans-serif;}
    .wrap{max-width:700px;margin:40px auto;padding:0 20px 40px;}
    .badge{display:inline-block;background:#0d7fbf;color:#fff;font-size:11px;font-weight:700;
           letter-spacing:0.6px;padding:4px 10px;border-radius:3px;margin-bottom:18px;
           text-transform:uppercase;}
    .card{background:#fff;border-radius:6px;padding:24px 28px;border:1px solid #c8dff2;
          font-size:15px;color:#1a2332;line-height:1.8;}
    .card p{margin:0 0 14px;}
    .card p:last-child{margin-bottom:0;}
    .footer{margin-top:22px;font-size:13px;}
    .footer a{color:#1a6fb5;text-decoration:none;font-weight:600;}
    .footer a:hover{text-decoration:underline;}
    .spinner{display:flex;align-items:center;gap:12px;color:#5a6e85;font-size:14px;padding:24px 0;}
    .spinner-icon{width:20px;height:20px;border:3px solid #c8dff2;border-top-color:#1a6fb5;
                  border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .error-msg{background:#fff;border-radius:6px;padding:24px 28px;border:1px solid #f5c6cb;
               color:#721c24;font-size:14px;line-height:1.6;}
    .error-msg a{color:#721c24;font-weight:600;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">English Version</div>

    <div id="loading" class="spinner">
      <div class="spinner-icon"></div>
      <span>Translating article&hellip;</span>
    </div>

    <div id="content" style="display:none;">
      <div id="article-text" class="card"></div>
      <div class="footer" id="footer-links"></div>
    </div>

    <div id="error" style="display:none;" class="error-msg"></div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var url = params.get('url');

      function escHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        var el = document.getElementById('error');
        el.innerHTML = msg;
        el.style.display = 'block';
      }

      if (!url) {
        showError('<strong>No article URL provided.</strong>');
        return;
      }

      var safeUrl = escHtml(url);
      document.getElementById('footer-links').innerHTML =
        '<a href="' + safeUrl + '" target="_blank">Read original article &rarr;</a>';

      fetch('https://blueem.ai/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url })
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          document.getElementById('loading').style.display = 'none';
          if (data.error) {
            showError(
              '<strong>Could not translate this article.</strong><br>' +
              escHtml(data.error) +
              '<br><br><a href="' + safeUrl + '" target="_blank">Open original article &rarr;</a>'
            );
            return;
          }
          var paras = data.text.split('\n').filter(function (p) { return p.trim(); });
          var html = paras.map(function (p) {
            return '<p>' + escHtml(p.trim()) + '</p>';
          }).join('');
          document.getElementById('article-text').innerHTML = html;
          document.getElementById('content').style.display = 'block';
        })
        .catch(function () {
          showError(
            '<strong>Translation service unavailable.</strong> Please try again later.' +
            '<br><br><a href="' + safeUrl + '" target="_blank">Open original article &rarr;</a>'
          );
        });
    })();
  </script>
</body>
</html>
